{% extends "base.html" %}
{% block content %}
<h2>Registrar Recepción - {{ orden.numero_orden }}</h2>
<p>Producto: {{ orden.cotizacion_ganadora.solicitud_cotizacion.solicitud_compra.producto_nombre }}</p>
<p>Cantidad esperada según la orden: <strong>{{ cantidad_esperada }}</strong></p>

<form method="post">
    {% csrf_token %}
    <label>Cantidad recibida:</label><br>
    <input type="number" name="cantidad_recibida" min="0" required><br><br>
    <label>Observaciones (productos dañados, caducados, etc.):</label><br>
    <textarea name="observaciones" rows="3" cols="40"></textarea><br><br>
    <button type="submit">Registrar recepción</button>
</form>
{% endblock %}
