{% extends "base.html" %}
{% block content %}
<h2>Proveedores</h2>
<a href="{% url 'compras_registrar_proveedor' %}">+ Nuevo proveedor</a>
<table border="1" cellpadding="5">
    <tr>
        <th>Nombre</th>
        <th>RUC</th>
        <th>Teléfono</th>
        <th>Correo</th>
    </tr>
    {% for p in proveedores %}
    <tr>
        <td>{{ p.nombre }}</td>
        <td>{{ p.ruc }}</td>
        <td>{{ p.telefono }}</td>
        <td>{{ p.correo }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No hay proveedores registrados.</td></tr>
    {% endfor %}
</table>
{% endblock %}
