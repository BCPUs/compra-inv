{% extends "base.html" %}
{% block content %}
<h2>Rechazar Solicitud {{ solicitud.codigo_solicitud }}</h2>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
<form method="post">
    {% csrf_token %}
    <label>Justificación (obligatoria):</label><br>
    <textarea name="justificacion" rows="3" cols="40"></textarea><br>
    <button type="submit">Rechazar solicitud</button>
</form>
{% endblock %}
