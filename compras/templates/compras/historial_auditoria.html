{% extends "base.html" %}
{% block content %}
<h2>Historial de Auditoría</h2>
<table border="1" cellpadding="5">
    <tr>
        <th>Fecha</th>
        <th>Usuario</th>
        <th>Acción</th>
        <th>Detalle</th>
    </tr>
    {% for a in acciones %}
    <tr>
        <td>{{ a.fecha }}</td>
        <td>{{ a.usuario|default:"Sistema" }}</td>
        <td>{{ a.accion }}</td>
        <td>{{ a.detalle }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No hay acciones registradas todavía.</td></tr>
    {% endfor %}
</table>
{% endblock %}
