{% extends "base.html" %}
{% block content %}
<h2>Agregar Proveedor a la Cotización</h2>

{% if proveedores_disponibles %}
<form method="post">
    {% csrf_token %}
    <label>Proveedor:</label>
    <select name="proveedor">
        {% for p in proveedores_disponibles %}
        <option value="{{ p.pk }}">{{ p.nombre }}</option>
        {% endfor %}
    </select>
    <button type="submit">Agregar</button>
</form>
{% else %}
<p>No hay más proveedores disponibles para agregar. <a href="{% url 'compras_registrar_proveedor' %}">Registra uno nuevo</a>.</p>
{% endif %}

<p><a href="{% url 'compras_ver_cotizaciones' solicitud_cotizacion.pk %}">Volver a cotizaciones</a></p>
{% endblock %}
