{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Rechazar Solicitud: {{ solicitud.codigo }}</h2>
    <!-- ST-3.6 Implementar rechazo con justificación -->
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="justificacion" class="form-label">Justificación del Rechazo</label>
            <textarea name="justificacion" id="justificacion" class="form-control" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-danger">Confirmar Rechazo</button>
        <a href="{% url 'bandeja_pendientes' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
