{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Editar Solicitud de Compra: {{ solicitud.codigo }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <h3>Items</h3>
        {{ formset.management_form }}
        <div id="items-container">
            {% for form in formset %}
                <div class="item-form border p-3 mb-3">
                    {{ form.as_p }}
                </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        <a href="{% url 'listar_solicitudes' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
