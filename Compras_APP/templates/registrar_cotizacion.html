{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Registrar Cotización de Proveedor</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar Cotización</button>
        <a href="{% url 'consultar_cotizaciones' solicitud_cotizacion.pk %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
