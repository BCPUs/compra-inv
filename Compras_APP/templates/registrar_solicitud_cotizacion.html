{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Vincular Proveedores a Solicitud: {{ solicitud_compra.codigo }}</h2>
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Seleccione Proveedores</label>
            {% for proveedor in proveedores %}
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="proveedores" value="{{ proveedor.id }}" id="prov_{{ proveedor.id }}">
                    <label class="form-check-label" for="prov_{{ proveedor.id }}">
                        {{ proveedor.nombre }} ({{ proveedor.ruc }})
                    </label>
                </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary">Crear Solicitud de Cotización</button>
        <a href="{% url 'listar_solicitudes' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
